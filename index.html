<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Player</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>// CLOUD PLAYER</h1>
    </header>

    <div class="input-section">
        <textarea id="config" placeholder="API Key&#10;Folder ID" spellcheck="false"></textarea>
        <button onclick="loadFiles()">LOAD</button>
    </div>

    <div class="file-list" id="fileList">
        <div class="empty">Введи API Key и нажми LOAD</div>
    </div>

    <div class="player" id="player">
        <div class="now-playing-label">NOW PLAYING</div>
        <div class="now-playing-title" id="nowPlayingTitle">—</div>
        <audio id="audioPlayer" controls></audio>
    </div>

    <div class="status" id="status"></div>

    <script src="player.js"></script>
</body>

</html>
